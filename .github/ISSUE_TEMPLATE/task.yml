name: "🧰 Task / Work Item"
description: "Plan, implement, and govern a concrete engineering work item."
title: "[TASK] <concise, action-oriented summary>"
labels:
  - "type:task"
  - "status:triage"

body:
  - type: markdown
    attributes:
      value: |
        👋 Welcome to BrikByte Studios Engineering.

        Use this template for **well-scoped, sprint-sized work items**:
        - Feature slices, bug fixes, refactors, platform improvements, enablement work

        ⛔ If this item exceeds **5 days**, split it or create an Epic.

        🔐 Do not include secrets, credentials, or personal data.

  # --- 1) Intent (Why) ---
  - type: textarea
    id: summary
    attributes:
      label: "Task Summary (Executive)"
      description: "One paragraph: what, why, outcome."
      placeholder: |
        What is being done?
        Why is it needed now?
        What measurable outcome is expected?
    validations:
      required: true

  # 🧠 JTBD Thinking
  - type: textarea
    id: jtbd
    attributes:
      label: "Job To Be Done (JTBD)"
      description: "Describe the real job this task supports."
      placeholder: |
        When [situation/context],
        the user/operator/team wants to [goal/progress],
        so they can [desired outcome].

        Functional job:
        Emotional job:
        Organizational job:
    validations:
      required: true

  # 🧠 Context Thinking
  - type: textarea
    id: job_context
    attributes:
      label: "Job Context / Trigger"
      description: "What workflow event or situation makes this task necessary?"
      placeholder: |
        Example:
        - Before production release
        - During CI failure triage
        - While generating audit evidence
        - During rollback handling
    validations:
      required: true

  - type: textarea
    id: problem_statement
    attributes:
      label: "Problem Statement"
      description: "Describe the current pain/failure mode in concrete terms."
      placeholder: |
        Current behavior:
        Who is affected:
        Evidence (logs, metrics, user reports):
        Why it matters (cost/risk/delay):
    validations:
      required: true

  - type: textarea
    id: objective
    attributes:
      label: "Objective (Outcome)"
      description: "What will be measurably better after this task?"
      placeholder: |
        After this task:
        - Capability added:
        - Risk reduced:
        - Constraint improved (speed, reliability, cost, compliance):
    validations:
      required: true

  # --- 2) Classification ---
  - type: dropdown
    id: task_type
    attributes:
      label: "Work Classification (type:*)"
      options:
        - "type:feature"
        - "type:improvement"
        - "type:bug"
        - "type:refactor"
        - "type:chore"
        - "type:spike"
        - "type:docs"
        - "type:test"
        - "type:governance"
      default: 0
    validations:
      required: true

  - type: input
    id: project
    attributes:
      label: "Project / Platform (proj/*)"
      placeholder: "proj/brikbyteos, proj/stackcraft-ts, proj/cargopulse"
    validations:
      required: true

  - type: input
    id: area
    attributes:
      label: "Primary Domain / Area (area:*)"
      placeholder: "area:auth, area:ci-cd, area:evidence"
    validations:
      required: true

  # --- 3) Triage ---
  - type: dropdown
    id: impact
    attributes:
      label: "Impact"
      options:
        - "High — customer/prod risk or major capability"
        - "Medium — noticeable improvement / important debt"
        - "Low — localized / internal"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      options:
        - "P0 — Production Blocker"
        - "P1 — Critical"
        - "P2 — Important"
        - "P3 — Nice-to-have"
    validations:
      required: true

  - type: dropdown
    id: size
    attributes:
      label: "Estimated Size"
      options:
        - "XS (≤1 day)"
        - "S (1–2 days)"
        - "M (2–3 days)"
        - "L (3–5 days)"
        - "XL (>5 days — split)"
    validations:
      required: true

  # --- 4) Scope ---
  - type: textarea
    id: scope
    attributes:
      label: "Scope (In / Out)"
      placeholder: |
        In scope:
        Out of scope:
        Assumptions:
        Constraints:
    validations:
      required: true

  # --- 5) Acceptance ---
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: "Acceptance Criteria"
      placeholder: |
        - [ ] Given <context>, when <action>, then <expected outcome>
        - [ ] Error handling is defined
        - [ ] No breaking changes without versioning
    validations:
      required: true

  # --- 6) Technical Approach ---
  - type: textarea
    id: technical_plan
    attributes:
      label: "Technical Approach"
      placeholder: |
        Architecture:
        Modules:
        Data changes:
        Migration:
    validations:
      required: false

  # 🧠 Contract Thinking
  - type: textarea
    id: contracts
    attributes:
      label: "Contracts / Interfaces"
      description: "Define inputs, outputs, and schemas affected."
      placeholder: |
        Inputs:
        Outputs:
        Schemas:
        API/interface changes:
        Compatibility guarantees:
    validations:
      required: false

  # 🧠 Trade-off Thinking
  - type: textarea
    id: tradeoffs
    attributes:
      label: "Trade-offs Considered"
      placeholder: |
        Benefits:
        Costs:
        Alternatives rejected:
        Why this approach:
    validations:
      required: false

  # --- 7) Test Plan ---
  - type: textarea
    id: test_plan
    attributes:
      label: "Test Plan"
      placeholder: |
        Unit:
        Integration:
        Edge cases:
        Negative tests:
        Rollback validation:
    validations:
      required: true

  # 🧠 Determinism Thinking
  - type: checkboxes
    id: determinism
    attributes:
      label: "Determinism / Stability Check"
      options:
        - label: "Same input produces same output"
        - label: "No hidden environment dependencies"
        - label: "Outputs are stable and reproducible"
        - label: "Failure behavior is explicit and controlled"

  # 🧠 Inversion Thinking
  - type: textarea
    id: failure_modes
    attributes:
      label: "Failure Modes / Risks"
      placeholder: |
        What could go wrong:
        Worst-case impact:
        Detection signal:
        Containment:
    validations:
      required: false

  # --- 8) Evidence ---
  - type: textarea
    id: evidence
    attributes:
      label: "Proof / Evidence"
      placeholder: |
        PR:
        Logs:
        Test results:
        Screenshots:
    validations:
      required: false
  
  # --- 9) Future Enhancements (Out of Scope) ---
  - type: textarea
    id: future_enhancements
    attributes:
      label: "Future Enhancements / Expansion (Out of Scope)"
      description: "Ideas intentionally NOT included in this task."
      placeholder: |
        Potential follow-ups:
        - ...

        Architectural evolutions:
        - ...

        Product extensions:
        - ...

        Notes:
        - If important, create a new task or Epic and reference it here.
    validations:
      required: false

  # --- 9) Preflight ---
  - type: checkboxes
    id: preflight
    attributes:
      label: "Preflight Validation"
      options:
        - label: "JTBD is clearly defined"
          required: true
        - label: "Scope is clear and bounded"
          required: true
        - label: "Task is ≤5 days or split"
          required: true
        - label: "Acceptance criteria are testable"
          required: true
        - label: "Test plan includes failure + rollback"
          required: true
        - label: "No sensitive data included"
          required: true
        - label: "Future enhancements are NOT included in current scope"
          required: true
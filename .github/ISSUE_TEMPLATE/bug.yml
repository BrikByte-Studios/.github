name: "🐞 Bug Report"
description: "Report a defect so we can triage, reproduce, and fix it efficiently."
title: "[BUG] <short summary>"
labels:
  - "type:bug"
  - "status:triage"

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        The more precise you are, the faster we can fix it.

        🔐 Remove or mask any sensitive data (keys, tokens, personal data).

  # -------------------------------------------------------
  # 1️⃣ Executive Summary & Business Context
  # -------------------------------------------------------

  - type: textarea
    id: summary
    attributes:
      label: "Summary"
      description: "Short, clear description of the defect."
      placeholder: "e.g., Cannot submit payment form when selecting Ozow on mobile."
    validations:
      required: true

  # 🧠 JTBD Impact
  - type: textarea
    id: jtbd_impact
    attributes:
      label: "JTBD Impact (What job is broken?)"
      description: "What user/job outcome is blocked or degraded?"
      placeholder: |
        When [context],
        the user wants to [goal],
        but instead [failure],
        so they cannot [desired outcome].

        Impact on user confidence:
        Impact on business:
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: "Business Impact"
      placeholder: |
        Affected users/tenants:
        Revenue impact:
        Operational impact:
        Customer-visible? (Y/N):
        Release-blocking? (Y/N):
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: "Severity (S*)"
      options:
        - "S0 - Critical (data loss, security breach, system down)"
        - "S1 - High (core flow broken; no workaround)"
        - "S2 - Medium (workaround exists)"
        - "S3 - Low (cosmetic / minor edge case)"
    validations:
      required: true

  - type: dropdown
    id: data_integrity
    attributes:
      label: "Data Integrity Impact"
      options:
        - "No data impact"
        - "Incorrect data displayed"
        - "Incorrect data stored"
        - "Data corruption risk"
        - "Data loss occurred"
    validations:
      required: true

  - type: dropdown
    id: security_impact
    attributes:
      label: "Security / Compliance Impact"
      options:
        - "None"
        - "Potential sensitive data exposure"
        - "Auth/RBAC bypass"
        - "Compliance risk (POPIA/GDPR/etc.)"
        - "Confirmed security incident"
    validations:
      required: true

  # -------------------------------------------------------
  # 2️⃣ Frequency & Blast Radius
  # -------------------------------------------------------

  - type: dropdown
    id: frequency
    attributes:
      label: "Frequency"
      options:
        - "Every time"
        - "Often"
        - "Sometimes"
        - "Rare"
        - "Unable to reproduce consistently"
    validations:
      required: true

  - type: textarea
    id: blast_radius
    attributes:
      label: "Blast Radius"
      placeholder: |
        Scope of impact:
        - Single tenant?
        - All tenants?
        - Region-specific?
        - Feature flag specific?
    validations:
      required: true

  # 🧠 Systems Thinking
  - type: textarea
    id: system_impact
    attributes:
      label: "System Impact"
      description: "What other systems, services, or workflows are affected?"
      placeholder: |
        Upstream dependencies:
        Downstream effects:
        Cascading failures:
    validations:
      required: false

  # -------------------------------------------------------
  # 3️⃣ Environment & Versioning
  # -------------------------------------------------------

  - type: dropdown
    id: environment
    attributes:
      label: "Environment"
      options:
        - "Production"
        - "Staging / UAT"
        - "QA"
        - "Development"
        - "Local"
    validations:
      required: true

  - type: input
    id: product_area
    attributes:
      label: "Product / Repo / Area"
      placeholder: "proj/brikbyteos • area:billing"
    validations:
      required: true

  - type: input
    id: version_build
    attributes:
      label: "Version / Build / Tag"
      placeholder: "v2.1.0 (build 2310)"
    validations:
      required: false

  - type: input
    id: commit_sha
    attributes:
      label: "Commit SHA (if known)"
      placeholder: "abc123def"
    validations:
      required: false

  # -------------------------------------------------------
  # 4️⃣ Reproduction
  # -------------------------------------------------------

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: "Steps to Reproduce"
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: "Expected Behavior"
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: "Actual Behavior"
    validations:
      required: true

  - type: dropdown
    id: regression
    attributes:
      label: "Regression?"
      options:
        - "Yes (previously working)"
        - "No (newly discovered behavior)"
        - "Unknown"
    validations:
      required: true

  # 🧠 Determinism Thinking
  - type: checkboxes
    id: reproducibility_quality
    attributes:
      label: "Reproducibility Quality"
      options:
        - label: "Steps consistently reproduce the issue"
        - label: "Environment conditions are clearly defined"
        - label: "Inputs/state are controlled and repeatable"

  # -------------------------------------------------------
  # 5️⃣ Debugging Thinking
  # -------------------------------------------------------

  # 🧠 Inversion Thinking
  - type: textarea
    id: failure_mode
    attributes:
      label: "Failure Mode (How the system failed)"
      placeholder: |
        What exactly broke?
        What assumptions failed?
        Where in the flow did it break?
    validations:
      required: false

  # 🧠 Root Cause Thinking
  - type: textarea
    id: root_cause
    attributes:
      label: "Root Cause Analysis (5 Whys)"
      placeholder: |
        Why 1:
        Why 2:
        Why 3:
        Why 4:
        Why 5:
    validations:
      required: false

  # 🧠 Hypothesis Thinking
  - type: textarea
    id: hypothesis
    attributes:
      label: "Debugging Hypothesis"
      placeholder: |
        Hypothesis:
        How to test:
        Result:
    validations:
      required: false

  # -------------------------------------------------------
  # 6️⃣ Workaround & Urgency
  # -------------------------------------------------------

  - type: textarea
    id: workaround
    attributes:
      label: "Workaround (if any)"
    validations:
      required: false

  - type: dropdown
    id: hotfix_required
    attributes:
      label: "Hotfix Required?"
      options:
        - "Yes — immediate patch required"
        - "No — can wait"
        - "Unsure"
    validations:
      required: true

  # -------------------------------------------------------
  # 7️⃣ Evidence
  # -------------------------------------------------------

  - type: textarea
    id: logs
    attributes:
      label: "Logs & Diagnostics (sanitized)"
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: "Screenshots / Recordings"
    validations:
      required: false

  - type: textarea
    id: feature_flags
    attributes:
      label: "Feature Flags / Config"
    validations:
      required: false

  # -------------------------------------------------------
  # 8️⃣ Preflight
  # -------------------------------------------------------

  - type: checkboxes
    id: preflight
    attributes:
      label: "Pre-Flight Checklist"
      options:
        - label: "Steps to reproduce are clear and deterministic"
          required: true
        - label: "JTBD impact is clearly described"
          required: true
        - label: "Logs/screenshots are sanitized"
          required: true
        - label: "This is not local misconfiguration"
          required: false
name: "rep-gov-002 - compliance (reusable)"

on:
  workflow_call:
    inputs:
      labels_path:
        description: "Path to labels.yml in caller repo"
        required: false
        type: string
        default: ".github/labels.yml"
    secrets:
      ADMIN_TOKEN:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install tools (jq + PyYAML)
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y jq python3-pip
          pip3 install --user pyyaml
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Assertions (templates, labels, dependabot)
        shell: bash
        run: |
          set -euo pipefail

          # 1) Templates present
          test -f .github/pull_request_template.md || { echo "::error::Missing PR template"; exit 1; }
          for f in bug_report.yml feature_request.yml security_report.yml config.yml; do
            test -f ".github/ISSUE_TEMPLATE/$f" || { echo "::error::Missing issue form: $f"; exit 1; }
          done

          # 2) Labels present with matching colors (paginate to avoid truncation)
          LIVE="$(gh api --paginate -H "Accept: application/vnd.github+json" \
            "repos/${{ github.repository }}/labels?per_page=100" \
            -q '.[] | {name, color, description}' | jq -s '.')"

          # Write Python helper to a temp file (avoids heredoc/process-substitution pitfalls)
          PY_HELPER="$(mktemp)"
          cat > "$PY_HELPER" <<'PY'
          import sys, json, yaml
          path = sys.argv[1]
          with open(path, 'r', encoding='utf-8') as fh:
              data = yaml.safe_load(fh) or []
              if not isinstance(data, list):
                  print("::error::labels spec must be a list", file=sys.stderr)
                  sys.exit(1)
              for item in data:
                  name = str((item or {}).get("name","")).strip()
                  color = str((item or {}).get("color","")).strip()
                  desc = "" if (item or {}).get("description") is None else str((item or {}).get("description"))
                  if not name or not color:
                      print("::error::label item missing name or color", file=sys.stderr)
                      sys.exit(1)
                  print(json.dumps({"name": name, "color": color, "description": desc}, ensure_ascii=False))
          PY

          # Emit spec items as JSON lines, then check against LIVE
          python3 "$PY_HELPER" "${{ inputs.labels_path }}" > labels.spec.ndjson

          while IFS= read -r L; do
            NAME="$(jq -r '.name'  <<<"$L")"
            COLOR="$(jq -r '.color' <<<"$L")"
            MATCH="$(jq -c --arg n "$NAME" '.[] | select(.name==$n)' <<<"$LIVE")"
            test -n "$MATCH" || { echo "::error::Missing label: $NAME"; exit 1; }
            test "$(jq -r '.color' <<<"$MATCH")" = "$COLOR" || { echo "::error::Color mismatch: $NAME"; exit 1; }
          done < labels.spec.ndjson

          # 3) Dependabot file present
          test -f .github/dependabot.yml || { echo "::error::Missing dependabot.yml"; exit 1; }

      - name: Export evidence & open PR
        shell: bash
        run: |
          set -euo pipefail
          day="$(date +%F)"
          mkdir -p ".audit/$day"

          gh api --paginate -H "Accept: application/vnd.github+json" \
            "repos/${{ github.repository }}/labels?per_page=100" > ".audit/$day/labels.json"
          ls .github/ISSUE_TEMPLATE > ".audit/$day/issue_templates.txt"
          sha256sum .github/dependabot.yml | awk '{print $1"  .github/dependabot.yml"}' > ".audit/$day/dependabot.yml.sha256"

          BR="audit/compliance-$day"
          git switch -c "$BR" || git switch "$BR"
          git add -f ".audit/$day"/*
          git -c user.name="brikbyte-bot" -c user.email="bot@brikbyte.dev" commit -m "audit: compliance snapshot ($day)" || echo "Nothing to commit."
          git push -u origin HEAD || echo "Push may have failed (branch may already exist)."
          gh pr create --base main --head "$BR" --title "audit: compliance ($day)" --body "Automated compliance evidence pack." || \
          gh pr view "$BR" --web >/dev/null 2>&1 || echo "PR already exists or cannot be created."

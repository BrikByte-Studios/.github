# =====================================================================
# Workflow: break-glass.yml
# Purpose: Controlled emergency override (dual approval, TTL, evidence)
# =====================================================================

name: break-glass

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Policy mode (solo|strict)"
        required: true
        default: "solo"
      ttl_minutes:
        description: "Time to auto-restore STRICT mode (≤180 min)"
        required: true
        default: "30"
      reason:
        description: "Short justification for emergency override"
        required: true
        default: "hotfix / CI outage"

permissions:
  contents: write
  pull-requests: write
  issues: write




jobs:
  break_glass:
    name: Execute Break-Glass Override
    runs-on: ubuntu-latest
    environment: break-glass # Require approval from environment reviewers before any steps execute

    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}

    steps:
      - name: 🧩 Validate Inputs
        id: validate
        run: |
          set -euo pipefail
          MODE="${{ github.event.inputs.mode }}"
          TTL="${{ github.event.inputs.ttl_minutes }}"
          if ! [[ "$MODE" =~ ^(solo|strict)$ ]]; then
            echo "❌ Invalid mode: $MODE"; exit 1
          fi
          if (( TTL > 180 )); then
            echo "❌ TTL exceeds maximum (180 min)"; exit 1
          fi
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "ttl=$TTL" >> $GITHUB_OUTPUT

      - name: 🗃️ Checkout repo
        uses: actions/checkout@v4

      - name: 📦 Capture pre-state evidence
        run: |
          set -euo pipefail
          day=$(date +%F)
          mkdir -p ".audit/$day"
          gh api "repos/${REPO}/branches/main/protection" > ".audit/$day/pre_breakglass_main.json"
          echo "Pre-state captured."

      - name: 🚨 Apply requested mode
        run: |
          set -euo pipefail
          MODE="${{ steps.validate.outputs.mode }}"
          echo "Applying mode: $MODE"
          gh workflow run branch-protection-toggle.yml --ref main -f mode="$MODE"

      - name: 🕒 Record TTL (used by compliance/restore job)
        run: |
          set -euo pipefail
          day=$(date +%F)
          mkdir -p .governance
          now_epoch=$(date -u +%s)
          ttl="${{ steps.validate.outputs.ttl }}"
          exp_epoch=$((now_epoch + (ttl*60)))
          exp_iso=$(date -u -d "@$exp_epoch" +"%Y-%m-%dT%H:%M:%SZ")
          cat > .governance/breakglass_ttl.json <<JSON
          {
            "invoker": "${{ github.actor }}",
            "mode": "${{ steps.validate.outputs.mode }}",
            "ttl_minutes": ${ttl},
            "reason": "${{ github.event.inputs.reason }}",
            "started_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "expires_at": "${exp_iso}",
            "run_id": "${{ github.run_id }}"
          }
          JSON

      - name: 📦 Capture post-state evidence
        run: |
          set -euo pipefail
          day=$(date +%F)
          # small grace for protection write
          sleep 10
          gh api "repos/${REPO}/branches/main/protection" > ".audit/$day/post_breakglass_main.json"

      - name: 🧾 Commit evidence + TTL (PR)
        run: |
          set -euo pipefail
          day=$(date +%F)
          br="audit/breakglass-${day}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          git config user.name  "brikbyte-bot"
          git config user.email "bot@brikbyte.dev"

          git switch -c "$br"
          # .audit and .governance are tracked; force add in case .audit is gitignored
          git add -f ".audit/$day" ".governance/breakglass_ttl.json"
          git commit -m "audit: break-glass (${day}) evidence + TTL marker"
          git push -u origin "$br"

          gh pr create \
            --title "audit: break-glass evidence (${day})" \
            --body  "Break-glass executed by **${{ github.actor }}**\n\n- Mode: `${{ steps.validate.outputs.mode }}`\n- TTL: `${{ steps.validate.outputs.ttl }}` minutes\n- Reason: `${{ github.event.inputs.reason }}`\n- Evidence: \`.audit/${day}/pre_breakglass_main.json\`, \`.audit/${day}/post_breakglass_main.json\`\n- TTL marker: \`.governance/breakglass_ttl.json\` (used by restore job)" \
            --base  main \
            --head  "$br"

      - name: ✅ Summary
        run: |
          echo "Break-glass completed. TTL restoration will be handled by the compliance/restore job."
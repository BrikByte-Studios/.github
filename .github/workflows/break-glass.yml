# Workflow: break-glass.yml
# Purpose: Controlled emergency override (dual approval, TTL, evidence)

name: break-glass

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Policy mode (solo|strict)"
        required: true
        default: "solo"
      ttl_minutes:
        description: "Time to auto-restore STRICT mode (≤180 min)"
        required: true
        default: "30"
      reason:
        description: "Short justification for emergency override"
        required: true
        default: "hotfix / CI outage"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # Gate + evidence capture + output wiring
  gate_and_evidence:
    name: Gate (env approval) + capture pre-state
    runs-on: ubuntu-latest
    environment: break-glass   # <-- Environment reviewers approve here
    outputs:
      mode: ${{ steps.validate.outputs.mode }}
      ttl:  ${{ steps.validate.outputs.ttl }}
    env:
      GH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
      REPO: ${{ github.repository }}

    steps:
      - name: 🧩 Validate Inputs
        id: validate
        shell: bash
        run: |
          set -euo pipefail
          MODE="${{ github.event.inputs.mode }}"
          TTL="${{ github.event.inputs.ttl_minutes }}"
          [[ "$MODE" =~ ^(solo|strict)$ ]] || { echo "Invalid mode: $MODE"; exit 1; }
          (( TTL <= 180 )) || { echo "TTL exceeds maximum (180 min)"; exit 1; }
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "ttl=$TTL"  >> "$GITHUB_OUTPUT"

      - name: 🗃️ Checkout repo
        uses: actions/checkout@v5

      - name: 📦 Capture pre-state evidence
        shell: bash
        run: |
          set -euo pipefail
          day=$(date +%F)
          mkdir -p ".audit/$day"
          gh api "repos/${REPO}/branches/main/protection" > ".audit/$day/pre_breakglass_main.json"
          echo "Pre-state captured."

  # Apply requested mode by CALLING the reusable toggle workflow
  apply_mode:
    name: Apply requested mode
    needs: [gate_and_evidence]
    uses: ./.github/workflows/branch-protection-toggle.yml
    with:
      mode: ${{ needs.gate_and_evidence.outputs.mode }}
    secrets: inherit

  # Wait for TTL so we can auto-restore STRICT
  wait_ttl:
    name: Wait TTL
    needs: [gate_and_evidence, apply_mode]
    runs-on: ubuntu-latest
    steps:
      - name: ⏳ Sleep until TTL
        shell: bash
        run: |
          set -euo pipefail
          TTL="${{ needs.gate_and_evidence.outputs.ttl }}"
          echo "Sleeping ${TTL} minute(s)…"
          sleep $(( TTL * 60 ))

  # Auto-restore STRICT after TTL if we were in SOLO
  restore_strict:
    name: Restore STRICT after TTL
    if: ${{ needs.gate_and_evidence.outputs.mode == 'solo' }}
    needs: [wait_ttl]
    uses: ./.github/workflows/branch-protection-toggle.yml
    with:
      mode: strict
    secrets: inherit

  # Post-state + evidence + PR
  post_and_commit:
    name: Capture post-state + commit evidence
    needs: [apply_mode]  # run after the first toggle; independent of restore
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v5

      - name: 📦 Capture post-state evidence
        shell: bash
        run: |
          set -euo pipefail
          day=$(date +%F)
          mkdir -p ".audit/$day"
          # small grace for protection write
          sleep 10
          gh api "repos/${REPO}/branches/main/protection" > ".audit/$day/post_breakglass_main.json"

      - name: 🧾 Commit evidence + TTL marker (PR)
        shell: bash
        run: |
          set -euo pipefail
          day=$(date +%F)
          mkdir -p .governance
          now_epoch=$(date -u +%s)
          ttl="${{ needs.gate_and_evidence.outputs.ttl }}"
          exp_epoch=$((now_epoch + (ttl*60)))
          exp_iso=$(date -u -d "@$exp_epoch" +"%Y-%m-%dT%H:%M:%SZ")

          cat > .governance/breakglass_ttl.json <<JSON
          {
            "invoker": "${{ github.actor }}",
            "mode": "${{ needs.gate_and_evidence.outputs.mode }}",
            "ttl_minutes": ${ttl},
            "reason": "${{ github.event.inputs.reason }}",
            "started_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "expires_at": "${exp_iso}",
            "run_id": "${{ github.run_id }}"
          }
          JSON

          br="audit/breakglass-$(date +%F)-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git config user.name  "brikbyte-bot"
          git config user.email "bot@brikbyte.dev"
          git switch -c "$br"

          # .audit may be gitignored; force add
          git add -f ".audit/$day" ".governance/breakglass_ttl.json"
          git commit -m "audit: break-glass (${day}) evidence + TTL marker"
          git push -u origin "$br"

          gh pr create \
            --title "audit: break-glass evidence (${day})" \
            --body  "Break-glass executed by **${{ github.actor }}**\n\n- Mode: \`${{ needs.gate_and_evidence.outputs.mode }}\`\n- TTL: \`${{ needs.gate_and_evidence.outputs.ttl }}\` minutes\n- Reason: \`${{ github.event.inputs.reason }}\`\n- Evidence: \`.audit/${day}/pre_breakglass_main.json\`, \`.audit/${day}/post_breakglass_main.json\`\n- TTL marker: \`.governance/breakglass_ttl.json\`" \
            --base  main \
            --head  "$br"

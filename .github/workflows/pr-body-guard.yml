name: pr-body-guard

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  guard:
    name: Lint PR body
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR content
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // { core, github, context } are provided by github-script.
            const pr = context.payload.pull_request;
            if (!pr) { core.setFailed('No pull_request in context'); return; }

            const title = pr.title ?? '';
            const body  = pr.body  ?? '';
            const issues = [];

            const esc = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            function sectionText(heading) {
              const re = new RegExp(`^##\\s*${esc(heading)}[\\s\\S]*?(?=\\n##\\s|\\n---|$)`, 'm');
              const m = body.match(re);
              return m ? m[0].replace(/^##[^\n]*\n?/, '').trim() : '';
            }

            // 1) Conventional-commit title: allow optional (scope)
            const allowed = ['feat','fix','refactor','perf','test','docs','build','ci','chore'];
            const cc = new RegExp(`^(${allowed.join('|')})(\\([^\\n)]+\\))?:\\s`);
            if (!cc.test(title)) {
              issues.push(`Title must match conventional commits, e.g. "ci: subject" or "ci(scope): subject". Got: "${title}"`);
            }

            // 2) Block placeholders (keep <scope>, drop <summary> to avoid false positives)
            [
              {re: /(^|\s)\.\.\.(\s|$)/, msg: 'Remove "..." placeholder'},
              {re: /…/,                  msg: 'Remove "…" placeholder'},
              {re: /<scope>/i,           msg: 'Remove "<scope>" placeholder from title or body'}
            ].forEach(({re,msg}) => { if (re.test(body)) issues.push(msg); });

            // 3) Required sections must be substantive
            const requiredSections = [
              '🧭 Summary','🔗 Linked Issues / Tickets','✅ Validation & Evidence','🧱 Breaking Changes?',
              '🚀 Deployment Notes','🔒 Security & Privacy','📈 Performance & Budgets','👀 Observability',
              '🗂 Documentation','🧪 Scope & Risk','🧾 Release Notes (user-facing)'
            ];

            // Relax perf/observability for CI-only PRs
            const isCI = /^ci(\([^)]*\))?:\s/i.test(title);
            const skipForCI = new Set(['📈 Performance & Budgets','👀 Observability']);

            for (const h of requiredSections) {
              if (isCI && skipForCI.has(h)) continue;
              const txt = sectionText(h)
                .replace(/!\[[^\]]*\]\([^)]+\)/g,'')
                .replace(/`[^`]*`/g,'')
                .replace(/^[>\s-]+/gm,'')
                .trim();
              if (!txt || txt.length < 10) {
                issues.push(`Section "${h}" appears empty or too short. Provide meaningful content (≥10 chars).`);
              }
            }

            // 4) What Changed must have at least one [x]
            {
              const sec = body.match(/##\s*🧩 What Changed[\s\S]*?(?=\n##\s|\n---|$)/m);
              if (sec) {
                const checked = (sec[0].match(/\[\s*[xX]\s*\]/g) || []).length;
                if (checked < 1) issues.push('Select at least one item under "🧩 What Changed".');
              } else {
                issues.push('Missing "🧩 What Changed" section.');
              }
            }

            // 5) If Breaking = Yes, require migration details
            {
              const bc = body.match(/##\s*🧱 Breaking Changes\?[\s\S]*?(?=\n##\s|\n---|$)/m);
              const yes = bc && /\-\s*\[\s*[xX]\s*\].*Yes/i.test(bc[0]);
              if (yes) {
                const details = body.match(/<details>\s*<summary>Migration \/ Rollback Plan<\/summary>[\s\S]*?<\/details>/m);
                const plain = details ? details[0].replace(/<[^>]+>/g,'').trim() : '';
                if (!plain || plain.length < 40) {
                  issues.push('Breaking change marked **Yes** but Migration/Rollback plan is missing or too short (≥40 chars).');
                }
              }
            }

            // Report
            if (issues.length) {
              issues.forEach(i => core.warning(i));
              await core.summary.addHeading('PR Body Guard — Issues Found', 3).addList(issues).write();
              core.setFailed('PR body failed guard checks.');
            } else {
              await core.summary.addHeading('PR Body Guard — All checks passed ✅', 3).write();
              core.notice('PR body passed all required checks.');
            }
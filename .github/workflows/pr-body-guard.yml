name: pr-body-guard

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  guard:
    name: Lint PR body
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR content
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // NOTE: github-script provides { core, github, context } globally.
            const pr = context.payload.pull_request;
            if (!pr) { core.setFailed('No pull_request in context'); return; }

            const title = pr.title ?? '';
            const body  = pr.body  ?? '';
            const issues = [];

            // ---------- helpers ----------
            const esc = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

            // Extract text of an H2 section by its exact heading label
            function sectionText(heading) {
              const re = new RegExp(
                `^##\\s*${esc(heading)}[\\s\\S]*?(?=\\n##\\s|\\n---|$)`,
                'm'
              );
              const m = body.match(re);
              if (!m) return '';
              return m[0].replace(/^##[^\n]*\n?/, '').trim();
            }

            // ---------- 1) Title lint (conventional commit) ----------
            const allowed = ['feat','fix','refactor','perf','test','docs','build','ci','chore'];
            if (!new RegExp(`^(${allowed.join('|')}):\\s`).test(title)) {
              issues.push(`Title must start with one of ${allowed.join(', ')} followed by ": ". Got: "${title}"`);
            }

            // ---------- 2) Block placeholders ----------
            [
              {re: /(^|\s)\.\.\.(\s|$)/, msg: 'Remove "..." placeholder'},
              {re: /…/,                  msg: 'Remove "…" placeholder'},
              {re: /<summary>/i,         msg: 'Remove "<summary>" placeholder'},
              {re: /<scope>/i,           msg: 'Remove "<scope>" placeholder'}
            ].forEach(({re,msg}) => { if (re.test(body)) issues.push(msg); });

            // ---------- 3) Required sections must be substantive ----------
            const requiredSections = [
              '🧭 Summary',
              '🔗 Linked Issues / Tickets',
              '✅ Validation & Evidence',
              '🧱 Breaking Changes?',
              '🚀 Deployment Notes',
              '🔒 Security & Privacy',
              '📈 Performance & Budgets',
              '👀 Observability',
              '🗂 Documentation',
              '🧪 Scope & Risk',
              '🧾 Release Notes (user-facing)'
            ];

            for (const h of requiredSections) {
              const txt = sectionText(h)
                .replace(/!\[[^\]]*\]\([^)]+\)/g,'') // strip images
                .replace(/`[^`]*`/g,'')              // strip inline code
                .replace(/^[>\s-]+/gm,'')            // trim bullets/quotes/space
                .trim();
              if (!txt || txt.length < 10) {
                issues.push(`Section "${h}" appears empty or too short. Provide meaningful content (≥10 chars).`);
              }
            }

            // ---------- 4) "What Changed" needs at least one [x] ----------
            {
              const sec = body.match(/##\s*🧩 What Changed[\s\S]*?(?=\n##\s|\n---|$)/m);
              if (sec) {
                const checked = (sec[0].match(/\[\s*[xX]\s*\]/g) || []).length;
                if (checked < 1) issues.push('Select at least one item under "🧩 What Changed".');
              } else {
                issues.push('Missing "🧩 What Changed" section.');
              }
            }

            // ---------- 5) If Breaking = Yes, require migration details ----------
            {
              const bc = body.match(/##\s*🧱 Breaking Changes\?[\s\S]*?(?=\n##\s|\n---|$)/m);
              const yes = bc && /\-\s*\[\s*[xX]\s*\].*Yes/i.test(bc[0]);
              if (yes) {
                const details = body.match(/<details>\s*<summary>Migration \/ Rollback Plan<\/summary>[\s\S]*?<\/details>/m);
                const plain = details ? details[0].replace(/<[^>]+>/g,'').trim() : '';
                if (!plain || plain.length < 40) {
                  issues.push('Breaking change marked **Yes** but Migration/Rollback plan is missing or too short (≥40 chars).');
                }
              }
            }

            // ---------- Report ----------
            if (issues.length) {
              await core.summary
                .addHeading('PR Body Guard — Issues Found', 3)
                .addList(issues)
                .write();
              core.setFailed('PR body failed guard checks.');
            } else {
              await core.summary
                .addHeading('PR Body Guard — All checks passed ✅', 3)
                .write();
              core.notice('PR body passed all required checks.');
            }

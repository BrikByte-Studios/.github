name: "rep-gov-002 - labels-seed (reusable)"

on:
  workflow_call:
    inputs:
      labels_path:
        description: "Path to labels.yml in caller repo"
        required: false
        type: string
        default: ".github/labels.yml"
    secrets:
      ADMIN_TOKEN:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install jq (gh CLI is preinstalled on ubuntu-latest)
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y jq

      # Convert YAML -> JSON using the official yq Action (no heredocs/inline Python)
      - name: Convert labels spec to JSON
        id: spec
        uses: mikefarah/yq@v4
        env:
          SPEC: ${{ inputs.labels_path }}
        with:
          cmd: yq -o=json '.' "$SPEC" > /tmp/labels.json

      - name: Read live labels
        id: live
        run: |
          set -euo pipefail
          gh api "repos/${{ github.repository }}/labels" \
            -q '.[] | {name, color, description}' | jq -s '.' > /tmp/live.json
          {
            echo 'json<<EOF'
            cat /tmp/live.json
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Upsert labels (idempotent; URL-encode names)
        run: |
          set -euo pipefail

          # /tmp/labels.json must be an array (from the yq conversion step)
          # /tmp/live.json was saved in the previous step
          jq -cr '.[] | @base64' /tmp/labels.json | while read -r row; do
            _jq() { echo "$row" | base64 -d | jq -r "$1"; }

            NAME="$(_jq '.name')"
            COLOR="$(_jq '.color')"
            DESC="$(_jq '.description // ""')"
            ENC_NAME="$(jq -rn --arg s "$NAME" '$s|@uri')"

            if jq -e --arg n "$NAME" '.[] | select(.name==$n)' /tmp/live.json >/dev/null; then
              gh api -X PATCH "repos/${{ github.repository }}/labels/$ENC_NAME" \
                -f color="$COLOR" -f description="$DESC"
            else
              gh api -X POST "repos/${{ github.repository }}/labels" \
                -f name="$NAME" -f color="$COLOR" -f description="$DESC" || \
              gh api -X PATCH "repos/${{ github.repository }}/labels/$ENC_NAME" \
                -f color="$COLOR" -f description="$DESC"
            fi
          done


      - name: Export evidence and open PR
        run: |
          set -euo pipefail
          day="$(date +%F)"
          mkdir -p ".audit/$day"
          gh api "repos/${{ github.repository }}/labels" > ".audit/$day/labels.json"
          sha="$(sha256sum "${{ inputs.labels_path }}" | awk '{print $1}')"
          printf "%s  %s\n" "$sha" "${{ inputs.labels_path }}" > ".audit/$day/labels.spec.sha256"

          BR="audit/labels-$day"
          git switch -c "$BR"
          git add -f ".audit/$day/labels.json" ".audit/$day/labels.spec.sha256"
          git -c user.name="brikbyte-bot" -c user.email="bot@brikbyte.dev" commit -m "audit: labels export ($day)"
          git push -u origin HEAD
          gh pr create --base main --head "$BR" --title "audit: labels export ($day)" --body "Automated evidence pack for labels."

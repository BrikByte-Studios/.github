name: "rep-gov-002 - labels-seed (reusable)"

on:
  workflow_call:
    inputs:
      labels_path:
        description: "Path to labels.yml in caller repo"
        required: false
        type: string
        default: ".github/labels.yml"
    secrets:
      ADMIN_TOKEN:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install jq + PyYAML
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y jq python3-pip
          pip3 install pyyaml

      # ① Build /tmp/labels.json from the spec (YAML → JSON array)
      - name: Build labels.json
        run: |
          set -euo pipefail
          SPEC="${{ inputs.labels_path }}"
          # Convert YAML (list of label objects) → JSON array at /tmp/labels.json
          python3 -c "import sys,yaml,json,pathlib; \
p=sys.argv[1]; d=yaml.safe_load(open(p)) or []; \
assert isinstance(d,list), 'labels spec must be a list'; \
pathlib.Path('/tmp/labels.json').write_text(json.dumps(d, ensure_ascii=False))" "$SPEC"
          echo "Built /tmp/labels.json:"
          jq length /tmp/labels.json

      # ② Snapshot live labels into /tmp/live.json
      - name: Read live labels
        run: |
          set -euo pipefail
          gh api "repos/${{ github.repository }}/labels" \
            -q '.[] | {name, color, description}' | jq -s '.' > /tmp/live.json
          echo "Live labels count:"
          jq length /tmp/live.json

      # Upsert labels (idempotent; URL-encode names). Base64-safe loop (no herestrings).
      - name: Upsert labels
        run: |
          set -euo pipefail
          test -s /tmp/labels.json || { echo "labels.json missing"; exit 1; }
          test -s /tmp/live.json   || { echo "live.json missing"; exit 1; }

          jq -cr '.[] | @base64' /tmp/labels.json | while read -r row; do
            _jq() { echo "$row" | base64 -d | jq -r "$1"; }

            NAME="$(_jq '.name')"
            COLOR="$(_jq '.color')"
            DESC="$(_jq '.description // ""')"
            ENC_NAME="$(jq -rn --arg s "$NAME" '$s|@uri')"

            if jq -e --arg n "$NAME" '.[] | select(.name==$n)' /tmp/live.json >/dev/null; then
              gh api -X PATCH "repos/${{ github.repository }}/labels/$ENC_NAME" \
                -f color="$COLOR" -f description="$DESC"
            else
              gh api -X POST "repos/${{ github.repository }}/labels" \
                -f name="$NAME" -f color="$COLOR" -f description="$DESC" || \
              gh api -X PATCH "repos/${{ github.repository }}/labels/$ENC_NAME" \
                -f color="$COLOR" -f description="$DESC"
            fi
          done

      # Evidence + PR (force-add in case .gitignore ignores .audit)
      - name: Export evidence and open PR
        run: |
          set -euo pipefail
          day="$(date +%F)"
          mkdir -p ".audit/$day"
          gh api "repos/${{ github.repository }}/labels" > ".audit/$day/labels.json"
          sha="$(sha256sum "${{ inputs.labels_path }}" | awk '{print $1}')"
          printf "%s  %s\n" "$sha" "${{ inputs.labels_path }}" > ".audit/$day/labels.spec.sha256"

          BR="audit/labels-$day"
          git switch -c "$BR"
          git add -f ".audit/$day/labels.json" ".audit/$day/labels.spec.sha256"
          git -c user.name="brikbyte-bot" -c user.email="bot@brikbyte.dev" commit -m "audit: labels export ($day)"
          git push -u origin HEAD
          gh pr create --base main --head "$BR" --title "audit: labels export ($day)" --body "Automated evidence pack for labels."
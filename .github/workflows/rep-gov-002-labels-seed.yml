name: "rep-gov-002 - labels-seed (reusable)"

on:
  workflow_call:
    inputs:
      labels_path:
        description: "Path to labels.yml in caller repo"
        required: false
        type: string
        default: ".github/labels.yml"
    secrets:
      ADMIN_TOKEN:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install tools (jq + PyYAML)
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y jq python3-pip
          pip3 install pyyaml

      - name: Upsert labels (idempotent; URL-encode names)
        shell: bash
        run: |
          set -euo pipefail
          SPEC="${{ inputs.labels_path }}"
          LIVE="$(gh api "repos/${{ github.repository }}/labels" -q '.[] | {name, color, description}' | jq -s '.')"

          # YAML -> JSONL (one object per line) without heredoc
          python3 -c 'import sys,yaml,json; d=yaml.safe_load(open(sys.argv[1])) or []; \
for it in d: print(json.dumps({"name":str(it.get("name","")).strip(), \
"color":str(it.get("color","")).strip(), \
"description":"" if it.get("description") is None else str(it.get("description"))}))' \
          "$SPEC" > /tmp/labels.jsonl

          while IFS= read -r L; do
            NAME="$(jq -r '.name' <<<"$L")"
            COLOR="$(jq -r '.color' <<<"$L")"
            DESC="$(jq -r '.description' <<<"$L")"
            ENC_NAME="$(jq -rn --arg s "$NAME" '$s|@uri')"

            if jq -e --arg n "$NAME" '.[] | select(.name==$n)' <<<"$LIVE" >/dev/null; then
              gh api -X PATCH "repos/${{ github.repository }}/labels/$ENC_NAME" \
                -f color="$COLOR" -f description="$DESC"
            else
              gh api -X POST "repos/${{ github.repository }}/labels" \
                -f name="$NAME" -f color="$COLOR" -f description="$DESC" || \
              gh api -X PATCH "repos/${{ github.repository }}/labels/$ENC_NAME" \
                -f color="$COLOR" -f description="$DESC"
            fi
          done < /tmp/labels.jsonl

      - name: Export evidence and open PR
        shell: bash
        run: |
          set -euo pipefail
          day="$(date +%F)"
          mkdir -p ".audit/$day"
          gh api "repos/${{ github.repository }}/labels" > ".audit/$day/labels.json"
          sha="$(sha256sum "${{ inputs.labels_path }}" | awk '{print $1}')"
          printf "%s  %s\n" "$sha" "${{ inputs.labels_path }}" > ".audit/$day/labels.spec.sha256"

          BR="audit/labels-$day"
          git switch -c "$BR"
          git add -f ".audit/$day/labels.json" ".audit/$day/labels.spec.sha256"
          git -c user.name="brikbyte-bot" -c user.email="bot@brikbyte.dev" commit -m "audit: labels export ($day)"
          git push -u origin HEAD
          gh pr create --base main --head "$BR" --title "audit: labels export ($day)" --body "Automated evidence pack for labels."

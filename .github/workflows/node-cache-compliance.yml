name: node-cache-compliance

on:
  workflow_dispatch: {}
  schedule:
    - cron: '17 3 * * *'  # nightly

permissions:
  actions: read
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Install tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y jq unzip

      - name: Gather last 20 completed workflow runs (this repo)
        id: runs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api "repos/${{ github.repository }}/actions/runs" \
            -q '.workflow_runs[] | {id, status, conclusion} | select(.status=="completed")' \
            | jq -s '.[0:20]' > /tmp/runs.json
          count=$(jq -r 'length' /tmp/runs.json)
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Collect cache metrics artifacts and compute hit rate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          hits=0
          total=0

          for run_id in $(jq -r '.[].id' /tmp/runs.json); do
            # list artifacts for the run (only cache-metrics)
            art_json=$(gh api "repos/${{ github.repository }}/actions/runs/${run_id}/artifacts" \
              -q '.artifacts[] | select(.name=="cache-metrics") | {id}')
            [ -z "$art_json" ] && continue
            art_id=$(echo "$art_json" | jq -r '.id')

            # download & inspect artifact
            work=/tmp/art
            rm -rf "$work" /tmp/art.zip
            mkdir -p "$work"
            gh api "repos/${{ github.repository }}/actions/artifacts/${art_id}/zip" > /tmp/art.zip
            unzip -o /tmp/art.zip -d "$work" >/dev/null

            if [ -f "$work/cache-metrics.json" ]; then
              val=$(jq -r '.cache_hit' "$work/cache-metrics.json")
              total=$((total+1))
              [ "$val" = "true" ] && hits=$((hits+1))
            fi
          done

          echo "hits=$hits total=$total" | tee /tmp/score.txt

          if [ "$total" -gt 0 ]; then
            rate=$(awk -v h="$hits" -v t="$total" 'BEGIN{printf "%.0f", (h/t)*100}')
          else
            rate=0
          fi

          echo "Cache hit rate over last $total runs: ${rate}% (threshold: 80%)" >> "$GITHUB_STEP_SUMMARY"

          # require >=10 samples and >=80% hit rate
          threshold_hits=$(( (80 * total + 99) / 100 ))  # ceil(0.8 * total)
          if [ "$total" -ge 10 ] && [ "$hits" -lt "$threshold_hits" ]; then
            echo "Cache hit rate below threshold"
            exit 1
          else
            echo "Cache hit rate OK"
          fi
